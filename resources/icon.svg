<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#1a0535"/>
      <stop offset="100%" stop-color="#05050f"/>
    </radialGradient>

    <radialGradient id="planet" cx="33%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="35%" stop-color="#8b5cf6"/>
      <stop offset="75%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e0a47"/>
    </radialGradient>

    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.05"/>
      <stop offset="20%"  stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="45%"  stop-color="#ede9fe" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#ede9fe" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4c1d95" stop-opacity="0.05"/>
      <stop offset="20%"  stop-color="#6d28d9" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#8b5cf6" stop-opacity="0.7"/>
      <stop offset="80%"  stop-color="#6d28d9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.05"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="planetShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="appShape">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- App background (rounded square) -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Deep space nebula glow -->
  <ellipse cx="512" cy="500" rx="380" ry="340" fill="url(#nebula)" clip-path="url(#appShape)"/>

  <!-- Stars — various sizes/opacities -->
  <g clip-path="url(#appShape)">
    <!-- tiny stars -->
    <circle cx="95"  cy="95"  r="1.5" fill="white" opacity="0.55"/>
    <circle cx="210" cy="55"  r="1"   fill="white" opacity="0.45"/>
    <circle cx="350" cy="80"  r="1.5" fill="white" opacity="0.50"/>
    <circle cx="560" cy="60"  r="1"   fill="white" opacity="0.40"/>
    <circle cx="720" cy="90"  r="1.5" fill="white" opacity="0.55"/>
    <circle cx="910" cy="75"  r="1"   fill="white" opacity="0.45"/>
    <circle cx="950" cy="180" r="1.5" fill="white" opacity="0.50"/>
    <circle cx="970" cy="420" r="1"   fill="white" opacity="0.35"/>
    <circle cx="960" cy="700" r="1.5" fill="white" opacity="0.45"/>
    <circle cx="900" cy="920" r="1"   fill="white" opacity="0.40"/>
    <circle cx="650" cy="960" r="1.5" fill="white" opacity="0.50"/>
    <circle cx="420" cy="950" r="1"   fill="white" opacity="0.35"/>
    <circle cx="180" cy="940" r="1.5" fill="white" opacity="0.45"/>
    <circle cx="65"  cy="780" r="1"   fill="white" opacity="0.40"/>
    <circle cx="75"  cy="560" r="1.5" fill="white" opacity="0.50"/>
    <circle cx="55"  cy="320" r="1"   fill="white" opacity="0.35"/>
    <!-- medium stars -->
    <circle cx="155" cy="200" r="2.5" fill="white" opacity="0.65"/>
    <circle cx="830" cy="160" r="2"   fill="white" opacity="0.60"/>
    <circle cx="880" cy="820" r="2.5" fill="white" opacity="0.60"/>
    <circle cx="145" cy="840" r="2"   fill="white" opacity="0.55"/>
    <!-- bright star (twinkle effect via extra glow circle) -->
    <circle cx="870" cy="240" r="3.5" fill="white" opacity="0.90" filter="url(#glow)"/>
    <circle cx="158" cy="750" r="3"   fill="white" opacity="0.80" filter="url(#glow)"/>
    <circle cx="820" cy="790" r="3"   fill="white" opacity="0.75" filter="url(#glow)"/>
  </g>

  <!-- Orion's Belt — 3 amber stars aligned (nod to the constellation) -->
  <g clip-path="url(#appShape)" filter="url(#glow)">
    <line x1="336" y1="215" x2="512" y2="196" stroke="#fbbf24" stroke-width="1.5" opacity="0.40"/>
    <line x1="512" y1="196" x2="688" y2="215" stroke="#fbbf24" stroke-width="1.5" opacity="0.40"/>
    <circle cx="336" cy="215" r="6"   fill="#fde68a" opacity="0.90"/>
    <circle cx="512" cy="196" r="5"   fill="#fde68a" opacity="0.80"/>
    <circle cx="688" cy="215" r="6"   fill="#fde68a" opacity="0.90"/>
  </g>

  <!-- Ring — back half (clipped to lower portion, behind planet) -->
  <g clip-path="url(#appShape)">
    <ellipse cx="512" cy="530" rx="355" ry="115"
      fill="none"
      stroke="url(#ringGrad2)"
      stroke-width="28"
      transform="rotate(-12 512 530)"
      opacity="0.55"/>
  </g>

  <!-- Planet glow halo -->
  <circle cx="512" cy="520" r="210" fill="#6d28d9" opacity="0.18" clip-path="url(#appShape)" filter="url(#softGlow)"/>

  <!-- Planet -->
  <circle cx="512" cy="520" r="185" fill="url(#planet)" clip-path="url(#appShape)" filter="url(#planetShadow)"/>

  <!-- Planet surface — highlight shimmer -->
  <ellipse cx="454" cy="452" rx="90" ry="58" fill="white" opacity="0.07" clip-path="url(#appShape)"/>
  <ellipse cx="420" cy="430" rx="40" ry="24" fill="white" opacity="0.06" clip-path="url(#appShape)"/>

  <!-- Planet — subtle band lines -->
  <ellipse cx="512" cy="530" rx="180" ry="22" fill="none" stroke="#7c3aed" stroke-width="4" opacity="0.12" clip-path="url(#appShape)"/>
  <ellipse cx="512" cy="490" rx="155" ry="14" fill="none" stroke="#a78bfa" stroke-width="3" opacity="0.10" clip-path="url(#appShape)"/>

  <!-- Music note inside planet -->
  <text x="512" y="565"
    text-anchor="middle"
    font-size="160"
    fill="white"
    opacity="0.14"
    font-family="Georgia, serif"
    clip-path="url(#appShape)">♫</text>

  <!-- Ring — front half (on top of planet) -->
  <g clip-path="url(#appShape)">
    <ellipse cx="512" cy="530" rx="355" ry="115"
      fill="none"
      stroke="url(#ringGrad)"
      stroke-width="28"
      transform="rotate(-12 512 530)"
      opacity="0.95"/>
  </g>

  <!-- Subtle edge vignette -->
  <rect width="1024" height="1024" rx="224" ry="224"
    fill="none"
    stroke="#000"
    stroke-width="40"
    opacity="0.35"/>
</svg>
